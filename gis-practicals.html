<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Practicals</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
text-align:center;
}

/* TITLE */
h1{
margin-top:40px;
color:#5c5144;
}

/* SOFTWARE BOXES */
.section{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
flex-wrap:wrap;
}

.box{
background:#e8dcc7;
padding:25px 40px;
border-radius:12px;
cursor:pointer;
font-size:18px;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.box:hover{
background:#d6c6a5;
transform:translateY(-6px);
}

/* PRACTICAL LIST */
.list{
margin-top:40px;
}

.item{
background:#e8dcc7;
margin:10px auto;
padding:15px;
width:320px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.item:hover{
background:#d6c6a5;
transform:translateY(-5px);
}

/* POPUP */
.popup-box{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:500px;
text-align:left;
max-height:80vh;
overflow:auto;
animation:fadeIn 0.4s ease;
}

/* CLOSE BUTTON */
.popup-content button{
margin-top:20px;
padding:10px 20px;
background:#5c5144;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* BACK BUTTON */
.back{
margin-top:40px;
padding:12px 25px;
background:#5c5144;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:768px){

.box{
width:90%;
}

.item{
width:90%;
}

}

</style>

</head>

<body>

<h1>GIS Practicals</h1>

<!-- SOFTWARE -->
<div class="section">
<div class="box" onclick="showQGIS()">QGIS</div>
<div class="box" onclick="showArc()">ArcPro</div>
<div class="box" onclick="showErdas()">ERDAS</div>
</div>

<!-- LIST -->
<div class="list" id="list"></div>

<button onclick="goBack()" class="back">Back</button>

<!-- POPUP -->
<div id="popup" class="popup-box">
<div class="popup-content">
<h2 id="title"></h2>
<p id="steps"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

let listDiv = document.getElementById("list");

/* DATA */

let qgis = [
{name:"Clip Tool", steps:"Step 1: Open QGIS\nStep 2: Load data\nStep 3: Use clip tool"},
{name:"Buffer", steps:"Step 1: Open tool\nStep 2: Select layer\nStep 3: Set distance"}
];

let arc = [
{name:"NDVI", steps:"Step 1: Add raster\nStep 2: Raster calculator\nStep 3: Apply NDVI formula"},
{name:"LST", steps:"Step 1: Load thermal band\nStep 2: Convert to temp\nStep 3: Calculate LST"}
];

let erdas = [
{name:"Classification", steps:"Step 1: Open image\nStep 2: Choose classifier\nStep 3: Run"},
{name:"Mosaic", steps:"Step 1: Import images\nStep 2: Mosaic tool\nStep 3: Save output"}
];

/* FUNCTIONS */

function showQGIS(){
displayList(qgis);
}

function showArc(){
displayList(arc);
}

function showErdas(){
displayList(erdas);
}

function displayList(data){
listDiv.innerHTML="";

data.forEach(item=>{
let div=document.createElement("div");
div.className="item";
div.innerText=item.name;
div.onclick=()=>showSteps(item.name,item.steps);
listDiv.appendChild(div);
});
}

function showSteps(name,steps){
document.getElementById("title").innerText=name;
document.getElementById("steps").innerText=steps;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>

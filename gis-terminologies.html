<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Terminologies</title>
<link rel="stylesheet" href="style.css">

<style>

.search{
padding:12px;
width:320px;
border-radius:6px;
border:none;
margin-top:20px;
font-size:16px;
}

/* Alphabet Grid */

.alphabet{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.alphabet span{
cursor:pointer;
padding:12px;
background:white;
color:black;
border-radius:8px;
text-align:center;
font-weight:bold;
transition:0.3s;
}

.alphabet span:hover{
background:#0077b6;
color:white;
transform:scale(1.1);
}

/* Terms */

.terms{
margin-top:30px;
}

.term{
background:white;
color:black;
margin:10px auto;
padding:12px;
width:400px;
border-radius:6px;
opacity:0;
transform:translateY(20px);
animation:fadeIn 0.4s forwards;
}

/* Animation */

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>GIS Terminologies</h1>

<input 
type="text" 
class="search" 
placeholder="Search terminology..." 
onkeyup="searchTerm()">

<div class="alphabet" id="alphabet"></div>

<div class="terms" id="terms">

<div class="term">ArcGIS</div>
<div class="term">Buffer</div>
<div class="term">Coordinate System</div>
<div class="term">DEM</div>
<div class="term">Elevation</div>
<div class="term">Feature Class</div>
<div class="term">Georeferencing</div>
<div class="term">Hillshade</div>
<div class="term">Interpolation</div>
<div class="term">Map Projection</div>
<div class="term">Raster</div>
<div class="term">Vector</div>
<div class="term">Spatial Analysis</div>
<div class="term">Topology</div>
<div class="term">UTM</div>
<div class="term">Zonal Statistics</div>

</div>

<button onclick="history.back()" class="back">Back</button>

</div>

<script>

let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let alphabetDiv=document.getElementById("alphabet");

alphabet.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerText=letter;
span.onclick=()=>filterLetter(letter);
alphabetDiv.appendChild(span);
})

function filterLetter(letter){

let terms=document.querySelectorAll(".term");

terms.forEach(term=>{

term.style.animation="none";
term.offsetHeight;

if(term.innerText.startsWith(letter)){
term.style.display="block";
term.style.animation="fadeIn 0.4s forwards";
}
else{
term.style.display="none";
}

})

}

function searchTerm(){

let input=document.querySelector(".search").value.toLowerCase();
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{

term.style.animation="none";
term.offsetHeight;

if(term.innerText.toLowerCase().includes(input)){
term.style.display="block";
term.style.animation="fadeIn 0.4s forwards";
}
else{
term.style.display="none";
}

})

}

</script>

</body>
</html>

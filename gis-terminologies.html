<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Terminologies</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
text-align:center;
}

h1{
margin-top:40px;
color:#5c5144;
}

.search{
padding:12px;
width:320px;
border-radius:6px;
border:none;
margin-top:20px;
}

/* ALPHABET */
.alphabet{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.alphabet span{
cursor:pointer;
padding:12px;
background:#e8dcc7;
border-radius:8px;
}

/* TERMS */
.term{
background:#e8dcc7;
margin:10px auto;
padding:15px;
width:320px;
border-radius:8px;
cursor:pointer;
}

/* POPUP */
.popup-box{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
}
</style>
</head>

<body>

<h1>GIS Terminologies</h1>

<input type="text" class="search" placeholder="Search..." onkeyup="searchTerm()">

<div class="alphabet" id="alphabet"></div>

<div id="terms"></div>

<div id="popup" class="popup-box">
<div class="popup-content">
<h2 id="title"></h2>
<p id="definition"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* 🔥 FULL DATA (paste all your 244 here) */
let data = [
{name:"Attribute", def:"Information about a map feature stored in a table."},
{name:"Arc", def:"A line feature used to represent roads or rivers."},
{name:"Area", def:"A closed shape representing a region."},
{name:"Buffer", def:"A zone created around a feature."},
{name:"Coordinate System", def:"System to locate places."},
{name:"DEM", def:"Digital Elevation Model."},
{name:"Raster", def:"Pixel based data."},
{name:"Vector", def:"Points, lines, polygons."}
];

/* ALPHABET */
let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let alphabetDiv=document.getElementById("alphabet");

alphabet.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerText=letter;
span.onclick=()=>filterLetter(letter);
alphabetDiv.appendChild(span);
});

/* DISPLAY */
let termsDiv=document.getElementById("terms");

function display(list){
termsDiv.innerHTML="";
list.forEach(item=>{
let div=document.createElement("div");
div.className="term";
div.innerText=item.name;
div.onclick=()=>showDef(item.name,item.def);
termsDiv.appendChild(div);
});
}

/* SEARCH */
function searchTerm(){
let input=document.querySelector(".search").value.toLowerCase();
let filtered=data.filter(item=>item.name.toLowerCase().includes(input));
display(filtered);
}

/* FILTER */
function filterLetter(letter){
let filtered=data.filter(item=>item.name.startsWith(letter));
display(filtered);
}

/* POPUP */
function showDef(name,def){
document.getElementById("title").innerText=name;
document.getElementById("definition").innerText=def;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* LOAD */
display(data);

</script>

</body>
</html>

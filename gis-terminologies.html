<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Terminologies</title>
<link rel="stylesheet" href="style.css">

<style>

.search{
padding:12px;
width:300px;
border-radius:5px;
border:none;
margin-top:20px;
}

.alphabet{
margin-top:30px;
}

.alphabet span{
margin:5px;
cursor:pointer;
padding:8px 12px;
background:white;
color:black;
border-radius:5px;
display:inline-block;
}

.alphabet span:hover{
background:#0077b6;
color:white;
}

.terms{
margin-top:30px;
}

.term{
background:white;
color:black;
margin:10px auto;
padding:10px;
width:400px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>GIS Terminologies</h1>

<input type="text" class="search" placeholder="Search terminology..." onkeyup="searchTerm()">

<div class="alphabet" id="alphabet"></div>

<div class="terms" id="terms">

<div class="term">ArcGIS</div>
<div class="term">Buffer</div>
<div class="term">Coordinate System</div>
<div class="term">DEM</div>
<div class="term">Elevation</div>
<div class="term">Feature Class</div>
<div class="term">Georeferencing</div>
<div class="term">Hillshade</div>
<div class="term">Interpolation</div>
<div class="term">Projection</div>
<div class="term">Raster</div>
<div class="term">Vector</div>

</div>

<button onclick="history.back()" class="back">Back</button>

</div>

<script>

let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let alphabetDiv=document.getElementById("alphabet");

alphabet.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerText=letter;
span.onclick=()=>filterLetter(letter);
alphabetDiv.appendChild(span);
})

function filterLetter(letter){
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{
if(term.innerText.startsWith(letter)){
term.style.display="block";
}else{
term.style.display="none";
}
})
}

function searchTerm(){
let input=document.querySelector(".search").value.toLowerCase();
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{
if(term.innerText.toLowerCase().includes(input)){
term.style.display="block";
}else{
term.style.display="none";
}
})
}

</script>

</body>
</html>

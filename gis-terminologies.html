<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Terminologies</title>
<link rel="stylesheet" href="style.css">

<style>

/* Search */
.search{
padding:12px;
width:320px;
border-radius:6px;
border:none;
margin-top:20px;
font-size:16px;
}

/* Alphabet Grid */
.alphabet{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.alphabet span{
cursor:pointer;
padding:12px;
background:white;
color:black;
border-radius:8px;
text-align:center;
font-weight:bold;
transition:0.3s;
}

.alphabet span:hover{
background:#0077b6;
color:white;
transform:scale(1.1);
}

/* Terms */
.terms{
margin-top:30px;
}

.term{
background:white;
color:black;
margin:10px auto;
padding:12px;
width:400px;
border-radius:6px;
cursor:pointer;
opacity:0;
transform:translateY(20px);
animation:fadeIn 0.4s forwards;
}

/* Popup */
.popup-box{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
color:black;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
animation:fadeIn 0.3s;
}

/* Animation */
@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>GIS Terminologies</h1>

<input type="text" class="search" placeholder="Search..." onkeyup="searchTerm()">

<div class="alphabet" id="alphabet"></div>

<div class="terms" id="terms">

<div class="term" onclick="showDef('ArcGIS')">ArcGIS</div>
<div class="term" onclick="showDef('Buffer')">Buffer</div>
<div class="term" onclick="showDef('Coordinate System')">Coordinate System</div>
<div class="term" onclick="showDef('DEM')">DEM</div>
<div class="term" onclick="showDef('Raster')">Raster</div>
<div class="term" onclick="showDef('Vector')">Vector</div>
<div class="term" onclick="showDef('NDVI')">NDVI</div>
<div class="term" onclick="showDef('LST')">LST</div>

</div>

<button onclick="goHome()" class="back">Back</button>

</div>

<!-- Popup -->
<div id="popup" class="popup-box">
<div class="popup-content">
<h2 id="title"></h2>
<p id="definition"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* Alphabet */
let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let alphabetDiv=document.getElementById("alphabet");

alphabet.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerText=letter;
span.onclick=()=>filterLetter(letter);
alphabetDiv.appendChild(span);
})

/* Filter by Alphabet */
function filterLetter(letter){
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{
term.style.animation="none";
term.offsetHeight;

if(term.innerText.startsWith(letter)){
term.style.display="block";
term.style.animation="fadeIn 0.4s forwards";
}else{
term.style.display="none";
}
})
}

/* Search */
function searchTerm(){
let input=document.querySelector(".search").value.toLowerCase();
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{
term.style.animation="none";
term.offsetHeight;

if(term.innerText.toLowerCase().includes(input)){
term.style.display="block";
term.style.animation="fadeIn 0.4s forwards";
}else{
term.style.display="none";
}
})
}

/* Definitions */
function showDef(term){

let definitions = {
"ArcGIS":"A GIS software used for mapping and spatial analysis.",
"Buffer":"Area created around a feature.",
"Coordinate System":"System used to define locations on Earth.",
"DEM":"Digital Elevation Model representing terrain.",
"Raster":"Pixel based satellite data.",
"Vector":"Data represented by points, lines and polygons.",
"NDVI":"Vegetation index used to analyze plant health.",
"LST":"Land Surface Temperature from satellite data."
};

document.getElementById("title").innerText = term;
document.getElementById("definition").innerText = definitions[term] || "Coming soon...";

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>

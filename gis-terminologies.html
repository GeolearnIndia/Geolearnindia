<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Terminologies</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
text-align:center;
}

/* TITLE */
h1{
margin-top:40px;
color:#5c5144;
}

/* SEARCH */
.search{
padding:12px;
width:320px;
border-radius:6px;
border:none;
margin-top:20px;
font-size:16px;
}

/* ALPHABET GRID */
.alphabet{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.alphabet span{
cursor:pointer;
padding:12px;
background:#e8dcc7;
color:#5c5144;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.alphabet span:hover{
background:#d6c6a5;
transform:scale(1.1);
}

/* TERMS */
.terms{
margin-top:30px;
}

.term{
background:#e8dcc7;
color:#5c5144;
margin:10px auto;
padding:15px;
width:320px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.term:hover{
background:#d6c6a5;
transform:translateY(-5px);
}

/* POPUP */
.popup-box{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
text-align:center;
}

/* BUTTON */
.popup-content button{
margin-top:20px;
padding:10px 20px;
background:#5c5144;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.back{
margin-top:40px;
padding:12px 25px;
background:#5c5144;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
.term{width:90%;}
.search{width:90%;}
.alphabet{grid-template-columns:repeat(4,1fr);}
}

</style>

</head>

<body>

<h1>GIS Terminologies</h1>

<input type="text" class="search" placeholder="Search..." onkeyup="searchTerm()">

<div class="alphabet" id="alphabet"></div>

<div class="terms" id="terms"></div>

<button onclick="goBack()" class="back">Back</button>

<!-- POPUP -->
<div id="popup" class="popup-box">
<div class="popup-content">
<h2 id="title"></h2>
<p id="definition"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* 🔥 YOUR FULL DATA (start adding here) */
let data = [
{name:"Attribute", def:"Information about a map feature stored in a table."},
{name:"Arc", def:"A line feature used to represent roads or rivers."},
{name:"Area", def:"A closed shape representing a region."},
{name:"Azimuth", def:"Direction measured in degrees from north."},
{name:"Accuracy", def:"How correct the data is compared to real world."},
{name:"Aerial Photo", def:"Image taken from above using drone or satellite."},
{name:"Buffer", def:"A zone created around a feature."},
{name:"Boundary", def:"Line showing limits of an area."},
{name:"Base Map", def:"Background map layer."},
{name:"Coordinate", def:"Numbers showing location."},
{name:"Coordinate System", def:"System to locate places."},
{name:"Contour Line", def:"Line joining equal elevation points."},
{name:"DEM", def:"Digital Elevation Model."},
{name:"Database", def:"Organized data storage."},
{name:"Feature", def:"Any real-world object on map."},
{name:"GIS", def:"System to analyze geographic data."},
{name:"Latitude", def:"Distance north/south of equator."},
{name:"Longitude", def:"Distance east/west."},
{name:"Raster", def:"Pixel-based data."},
{name:"Vector", def:"Points, lines, polygons."},
{name:"NDVI", def:"Vegetation index."},
{name:"LST", def:"Land Surface Temperature."},
{name:"Projection", def:"Method to represent Earth."},
{name:"Pixel", def:"Smallest unit of raster."},
{name:"Remote Sensing", def:"Data collection via satellites."},
{name:"Spatial Data", def:"Location-based data."},
{name:"Shapefile", def:"Vector file format."},
{name:"Topology", def:"Relationship between features."},
{name:"UTM", def:"Coordinate system dividing Earth."},
{name:"Web GIS", def:"GIS on internet."}
];

/* 🔥 AUTO SYSTEM */

let termsDiv = document.getElementById("terms");

/* A-Z SORT */
data.sort((a,b)=>a.name.localeCompare(b.name));

/* DISPLAY */
function displayTerms(list){
termsDiv.innerHTML="";
list.forEach(item=>{
let div=document.createElement("div");
div.className="term";
div.innerText=item.name;
div.onclick=()=>showDef(item.name,item.def);
termsDiv.appendChild(div);
});
}

/* SEARCH */
function searchTerm(){
let input=document.querySelector(".search").value.toLowerCase();
let filtered = data.filter(item =>
item.name.toLowerCase().includes(input)
);
displayTerms(filtered);
}

/* ALPHABET */
function filterLetter(letter){
let filtered = data.filter(item =>
item.name.startsWith(letter)
);
displayTerms(filtered);
}

/* ALPHABET UI */
let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let alphabetDiv=document.getElementById("alphabet");

alphabet.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerText=letter;
span.onclick=()=>filterLetter(letter);
alphabetDiv.appendChild(span);
});

/* POPUP */
function showDef(name,def){
document.getElementById("title").innerText=name;
document.getElementById("definition").innerText=def;
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function goBack(){
window.location.href="index.html";
}

/* LOAD */
displayTerms(data);

</script>

</body>
</html>

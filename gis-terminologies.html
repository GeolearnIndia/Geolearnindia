<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Terminologies</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
text-align:center;
}

/* TITLE */
h1{
margin-top:40px;
color:#5c5144;
}

/* SEARCH */
.search{
padding:12px;
width:320px;
border-radius:6px;
border:none;
margin-top:20px;
font-size:16px;
}

/* ALPHABET GRID */
.alphabet{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.alphabet span{
cursor:pointer;
padding:12px;
background:#e8dcc7;
color:#5c5144;
border-radius:8px;
font-weight:bold;
transition:0.3s;
}

.alphabet span:hover{
background:#d6c6a5;
transform:scale(1.1);
}

/* TERMS */
.terms{
margin-top:30px;
}

.term{
background:#e8dcc7;
color:#5c5144;
margin:10px auto;
padding:15px;
width:320px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.term:hover{
background:#d6c6a5;
transform:translateY(-5px);
}

/* POPUP */
.popup-box{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
color:black;
padding:25px;
border-radius:12px;
width:90%;
max-width:400px;
text-align:center;
animation:fadeIn 0.3s ease;
}

/* BUTTONS */
.popup-content button{
margin-top:20px;
padding:10px 20px;
background:#5c5144;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.back{
margin-top:40px;
padding:12px 25px;
background:#5c5144;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:768px){

.term{
width:90%;
}

.search{
width:90%;
}

.alphabet{
grid-template-columns:repeat(4,1fr);
}

}

</style>

</head>

<body>

<h1>GIS Terminologies</h1>

<input type="text" class="search" placeholder="Search..." onkeyup="searchTerm()">

<div class="alphabet" id="alphabet"></div>

<div class="terms" id="terms">

<div class="term" onclick="showDef('ArcGIS')">ArcGIS</div>
<div class="term" onclick="showDef('Buffer')">Buffer</div>
<div class="term" onclick="showDef('Coordinate System')">Coordinate System</div>
<div class="term" onclick="showDef('DEM')">DEM</div>
<div class="term" onclick="showDef('Raster')">Raster</div>
<div class="term" onclick="showDef('Vector')">Vector</div>
<div class="term" onclick="showDef('NDVI')">NDVI</div>
<div class="term" onclick="showDef('LST')">LST</div>

</div>

<button onclick="goBack()" class="back">Back</button>

<!-- POPUP -->
<div id="popup" class="popup-box">
<div class="popup-content">
<h2 id="title"></h2>
<p id="definition"></p>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* ALPHABET */
let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let alphabetDiv=document.getElementById("alphabet");

alphabet.split("").forEach(letter=>{
let span=document.createElement("span");
span.innerText=letter;
span.onclick=()=>filterLetter(letter);
alphabetDiv.appendChild(span);
})

/* FILTER */
function filterLetter(letter){
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{
if(term.innerText.startsWith(letter)){
term.style.display="block";
}else{
term.style.display="none";
}
})
}

/* SEARCH */
function searchTerm(){
let input=document.querySelector(".search").value.toLowerCase();
let terms=document.querySelectorAll(".term");

terms.forEach(term=>{
if(term.innerText.toLowerCase().includes(input)){
term.style.display="block";
}else{
term.style.display="none";
}
})
}

/* DEFINITIONS */
function showDef(term){

let definitions = {
"ArcGIS":"A GIS software used for mapping and spatial analysis.",
"Buffer":"Area created around a feature.",
"Coordinate System":"System used to define locations on Earth.",
"DEM":"Digital Elevation Model representing terrain.",
"Raster":"Pixel based satellite data.",
"Vector":"Data represented by points, lines and polygons.",
"NDVI":"Vegetation index used to analyze plant health.",
"LST":"Land Surface Temperature from satellite data."
};

document.getElementById("title").innerText = term;
document.getElementById("definition").innerText = definitions[term] || "Coming soon...";

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>

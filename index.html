<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoLearn India</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
overflow-x:hidden;
}

/* POPUP FULL SCREEN */
.popup{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 0.6s ease;
}

/* TITLE */
.popup h1{
font-size:45px;
color:#5c5144;
margin-bottom:10px;
}

.popup p{
color:#7a6f60;
margin-bottom:40px;
font-size:18px;
}

/* CARDS */
.card-container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#e8dcc7;
padding:40px;
border-radius:12px;
width:280px;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card h2{
color:#5c5144;
}

/* CONTENT */
.content{
display:none;
text-align:center;
padding-top:80px;
animation:fadeIn 0.5s ease;
}

/* MENU */
.menu{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
flex-wrap:wrap;
}

.menu-item{
background:#e8dcc7;
padding:30px 50px;
border-radius:12px;
cursor:pointer;
font-size:20px;
min-width:220px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.menu-item:hover{
background:#d6c6a5;
transform:translateY(-8px);
}

/* BACK BUTTON */
.back{
margin-top:70px;
padding:12px 25px;
border:none;
background:#5c5144;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
display:block;
margin-left:auto;
margin-right:auto;
transition:0.3s;
}

.back:hover{
background:#3e352c;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

.popup h1{
font-size:32px;
}

.card{
width:90%;
}

.menu-item{
width:90%;
font-size:18px;
}

}

</style>

</head>

<body>

<!-- HOME POPUP -->
<div class="popup" id="home">

<h1>GeoLearn India</h1>
<p>Select Category</p>

<div class="card-container">

<div class="card" onclick="openGIS()">
<h2>GIS</h2>
</div>

<div class="card" onclick="openRS()">
<h2>Remote Sensing</h2>
</div>

</div>

</div>

<!-- GIS -->
<div id="gis" class="content">
<h2>GIS Section</h2>

<div class="menu">
<div class="menu-item" onclick="location.href='gis-terminologies.html'">Terminologies</div>
<div class="menu-item" onclick="location.href='gis-practicals.html'">Practicals</div>
<div class="menu-item">Code</div>
</div>

<button onclick="goBack()" class="back">Back</button>
</div>

<!-- RS -->
<div id="rs" class="content">
<h2>Remote Sensing</h2>

<div class="menu">
<div class="menu-item">Terminologies</div>
<div class="menu-item">Practicals</div>
<div class="menu-item">Code</div>
</div>

<button onclick="goBack()" class="back">Back</button>
</div>

<script>

/* Smooth transition */
function openGIS(){
fadeOut("home");
setTimeout(()=>{
document.getElementById("gis").style.display="block";
},300);
}

function openRS(){
fadeOut("home");
setTimeout(()=>{
document.getElementById("rs").style.display="block";
},300);
}

function goBack(){
document.getElementById("home").style.display="flex";
document.getElementById("gis").style.display="none";
document.getElementById("rs").style.display="none";
}

/* Fade effect */
function fadeOut(id){
let el=document.getElementById(id);
el.style.opacity="0";
el.style.transform="translateY(-20px)";
setTimeout(()=>{
el.style.display="none";
el.style.opacity="1";
el.style.transform="translateY(0)";
},300);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoLearn India</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>GeoLearn India</h2>
<div class="nav-links">
<span onclick="goHome()">Home</span>
<span onclick="openGIS()">GIS</span>
<span onclick="openRS()">Remote Sensing</span>
</div>
</div>

<!-- HOME -->
<div class="container" id="home">

<h1 class="title">Welcome to GeoLearn India</h1>
<p class="subtitle">Learn GIS & Remote Sensing Easily</p>

<div class="card-container">

<div class="card" onclick="openGIS()">
<h2>GIS</h2>
<p>Terminologies, Practicals & Tools</p>
</div>

<div class="card" onclick="openRS()">
<h2>Remote Sensing</h2>
<p>NDVI, LST & Satellite Data</p>
</div>

</div>

</div>

<!-- GIS -->
<div id="gis" class="content">
<h2>GIS Section</h2>

<div class="menu">
<div class="menu-item" onclick="location.href='gis-terminologies.html'">Terminologies</div>
<div class="menu-item" onclick="location.href='gis-practicals.html'">Practicals</div>
<div class="menu-item">GEE Code</div>
<div class="menu-item">Data Download</div>
</div>
</div>

<!-- RS -->
<div id="rs" class="content">
<h2>Remote Sensing</h2>

<div class="menu">
<div class="menu-item">Terminologies</div>
<div class="menu-item">Practicals</div>
<div class="menu-item">LST</div>
<div class="menu-item">NDVI</div>
</div>
</div>

<script>

function openGIS(){
document.getElementById('home').style.display='none';
document.getElementById('gis').style.display='block';
document.getElementById('rs').style.display='none';
}

function openRS(){
document.getElementById('home').style.display='none';
document.getElementById('gis').style.display='none';
document.getElementById('rs').style.display='block';
}

function goHome(){
document.getElementById('home').style.display='block';
document.getElementById('gis').style.display='none';
document.getElementById('rs').style.display='none';
}

</script>

</body>
</html>

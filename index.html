<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoLearn India</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
}

/* POPUP FULL SCREEN */
.popup{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* TITLE */
.popup h1{
font-size:50px;
color:#5c5144;
margin-bottom:10px;
}

.popup p{
color:#7a6f60;
margin-bottom:40px;
font-size:18px;
}

/* CARDS */
.card-container{
display:flex;
gap:40px;
}

.card{
background:#e8dcc7;
padding:40px;
border-radius:12px;
width:300px;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card:hover{
transform:translateY(-10px);
}

.card h2{
color:#5c5144;
}

.card p{
color:#6e6254;
}

/* HIDDEN CONTENT */
.content{
display:none;
text-align:center;
padding-top:100px;
}

.menu{
display:flex;
justify-content:center;
gap:40px;
margin-top:60px;
flex-wrap:wrap;
}

.menu-item{
background:#e8dcc7;
padding:30px 50px;
border-radius:12px;
cursor:pointer;
font-size:20px;
min-width:220px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.menu-item:hover{
background:#d6c6a5;
transform:translateY(-8px);
}

.menu-item:hover{
background:#d6c6a5;
}

.back{
margin-top:30px;
padding:10px 20px;
border:none;
background:#5c5144;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- POPUP HOME -->
<div class="popup" id="home">

<h1>GeoLearn India</h1>
<p>Select Category</p>

<div class="card-container">

<div class="card" onclick="openGIS()">
<h2>GIS</h2>
</div>

<div class="card" onclick="openRS()">
<h2>Remote Sensing</h2>
</div>

</div>

</div>

<!-- GIS -->
<div id="gis" class="content">
<h2>GIS Section</h2>

<div class="menu">
<div class="menu-item" onclick="location.href='gis-terminologies.html'">Terminologies</div>
<div class="menu-item" onclick="location.href='gis-practicals.html'">Practicals</div>
<div class="menu-item">Code</div>
</div>

<button onclick="goBack()" class="back">Back</button>
</div>

<!-- RS -->
<div id="rs" class="content">
<h2>Remote Sensing</h2>

<div class="menu">
<div class="menu-item">Terminologies</div>
<div class="menu-item">Practicals</div>
<div class="menu-item">Code</div>
</div>

<button onclick="goBack()" class="back">Back</button>
</div>

<script>

function openGIS(){
document.getElementById("home").style.display="none";
document.getElementById("gis").style.display="block";
}

function openRS(){
document.getElementById("home").style.display="none";
document.getElementById("rs").style.display="block";
}

function goBack(){
document.getElementById("home").style.display="flex";
document.getElementById("gis").style.display="none";
document.getElementById("rs").style.display="none";
}

</script>

</body>
</html>

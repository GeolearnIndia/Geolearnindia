<!DOCTYPE html>
<html>
<head>
<title>GIS Code</title>
<style>

body{
font-family:Arial;
background:#f4f1ea;
text-align:center;
}

.item{
background:#e8dcc7;
margin:10px auto;
padding:15px;
width:250px;
cursor:pointer;
border-radius:5px;
}

.code-box{
display:none;
background:white;
margin:20px auto;
padding:20px;
width:80%;
max-width:500px;
position:relative;
}

.copy{
position:absolute;
top:10px;
right:10px;
}

</style>
</head>

<body>

<h1>GIS Code</h1>

<div class="item" onclick="showCode('ndvi')">NDVI Code</div>
<div class="item" onclick="showCode('lst')">LST Code</div>

<div id="box" class="code-box">
<button class="copy" onclick="copyCode()">Copy</button>
<pre id="code"></pre>
</div>

<button onclick="goBack()">Back</button>

<script>

function showCode(type){
let codeText="";

if(type=="ndvi"){
codeText="NDVI CODE\nimage.normalizedDifference(['NIR','RED'])";
}
else if(type=="lst"){
codeText="LST CODE\nimage.multiply(0.02).subtract(273.15)";
}

document.getElementById("box").style.display="block";
document.getElementById("code").innerText=codeText;
}

function copyCode(){
let text=document.getElementById("code").innerText;
navigator.clipboard.writeText(text);
alert("Copied!");
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>

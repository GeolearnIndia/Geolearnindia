<!DOCTYPE html>
<html>
<head>
<title>GIS Code</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f1ea;
text-align:center;
}

/* TITLE */
h1{
margin-top:40px;
color:#5c5144;
}

/* LIST ITEMS */
.item{
background:#e8dcc7;
margin:15px auto;
padding:20px;
width:320px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.item:hover{
background:#d6c6a5;
transform:translateY(-6px);
}

/* CODE BOX */
.code-box{
display:none;
background:white;
margin:30px auto;
padding:25px;
width:90%;
max-width:750px;
position:relative;
text-align:left;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
animation:fadeIn 0.4s ease;
}

/* COPY BUTTON */
.copy{
position:absolute;
top:10px;
right:10px;
padding:6px 12px;
background:#5c5144;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.copy:hover{
background:#3e352c;
}

/* CODE TEXT */
pre{
white-space:pre-wrap;
word-wrap:break-word;
font-size:14px;
}

/* BACK BUTTON */
.back{
margin-top:40px;
padding:12px 25px;
background:#5c5144;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.back:hover{
background:#3e352c;
}

/* ANIMATION */
@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */
@media(max-width:768px){
.item{
width:90%;
}

}

</style>

</head>

<body>

<h1>GIS Code</h1>

<!-- LIST -->
<div class="item" onclick="showCode('dem')">DEM Code (ROI Based)</div>
<div class="item" onclick="showCode('global')">Global Watershed + DEM Code</div>

<!-- CODE BOX -->
<div id="box" class="code-box">
<button class="copy" onclick="copyCode()">Copy</button>
<pre id="code"></pre>
</div>

<button onclick="goBack()" class="back">Back</button>

<script>

function showCode(type){
let codeText="";

if(type=="dem"){
codeText = `// DEM Code (ROI Based)

var roi = roi;
roi = roi.geometry();

var dem = ee.Image("USGS/SRTMGL1_003");

var dem_roi = dem.clip(roi);

Map.centerObject(roi, 10);

var vis = {
  min: 0,
  max: 6000,
  palette: ['blue','cyan','green','yellow','orange','red']
};

Map.addLayer(dem_roi, vis, "DEM (Bound to ROI)");

Export.image.toDrive({
  image: dem_roi,
  description: "DEM_According_to_ROI",
  region: roi,
  scale: 30,
  fileFormat: "GeoTIFF"
});`;
}

else if(type=="global"){
codeText = `// Global Watershed + DEM Code

Map.setCenter(0, 20, 2);

var basins = ee.FeatureCollection("WWF/HydroSHEDS/v1/Basins/hybas_5");

var styledBasins = basins.style({
  color: 'blue',
  fillColor: '00000000',
  width: 1
});

Map.addLayer(styledBasins, {}, 'Global Watersheds');

var rivers = ee.FeatureCollection("WWF/HydroSHEDS/v1/FreeFlowingRivers");

Map.addLayer(rivers.style({color: 'cyan'}), {}, 'Global Rivers');

var dem = ee.Image("USGS/SRTMGL1_003");

Map.addLayer(dem, {min: 0, max: 4000, palette: ['white','brown']}, 'DEM');`;
}

document.getElementById("box").style.display="block";
document.getElementById("code").innerText = codeText;
}

function copyCode(){
let text = document.getElementById("code").innerText;
navigator.clipboard.writeText(text);
alert("Code Copied!");
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
